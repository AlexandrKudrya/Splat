<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Merilo WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 16px; }
        pre { white-space: pre-wrap; word-break: break-all; background: #f5f5f5; padding: 12px; border-radius: 8px; }
        button { padding: 10px 14px; margin-top: 10px; }
    </style>
</head>
<body>
<h2>Merilo initData</h2>
<pre id="out">loading…</pre>
<button id="send">Auth on backend</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const initData = tg.initData || "";
    document.getElementById("out").textContent = initData || "(empty initData)";


    const BACKEND = "https://localhost:8080";

    document.getElementById("send").onclick = async () => {
      const res = await fetch(`${BACKEND}/api/v1/auth/telegram`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ init_data: initData })
      });
      const text = await res.text();
      alert(`Status: ${res.status}\n\n${text}`);
    };
</script>
</body>
</html>
