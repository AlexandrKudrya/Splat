name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: ktlint check
        working-directory: backend
        run: mvn --batch-mode ktlint:check

  test-backend:
    name: Tests (backend)
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn --batch-mode test

  lint-bot:
    name: Lint (bot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: bot
        run: uv sync --group dev

      - name: ruff check
        working-directory: bot
        run: uv run ruff check .

      - name: ruff format check
        working-directory: bot
        run: uv run ruff format --check .

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, lint-bot]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: merilo-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          push: false
          tags: merilo-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
