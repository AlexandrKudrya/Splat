name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: ruff check
        working-directory: backend
        run: uv run ruff check .

      - name: ruff format check
        working-directory: backend
        run: uv run ruff format --check .

  test-backend:
    name: Tests (backend)
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: splitcheck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/splitcheck_test
      TELEGRAM_BOT_TOKEN: test_token
      SECRET_KEY: test_secret_key_that_is_long_enough_32chars
      ANTHROPIC_API_KEY: test_key
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      S3_BUCKET_NAME: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run tests
        working-directory: backend
        run: uv run pytest -v

  lint-bot:
    name: Lint (bot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: bot
        run: uv sync --group dev

      - name: ruff check
        working-directory: bot
        run: uv run ruff check .

      - name: ruff format check
        working-directory: bot
        run: uv run ruff format --check .

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, lint-bot]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: splitcheck-backend:${{ github.sha }}

      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          push: false
          tags: splitcheck-bot:${{ github.sha }}
